services:
  postgres-test:
    image: postgres:16-alpine
    container_name: dada-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: dada_test
      POSTGRES_PASSWORD: dada_test
      POSTGRES_DB: dada_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dada_test']
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: dada-redis-test
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
